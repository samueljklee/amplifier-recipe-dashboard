<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — __HOSTNAME__</title>
  <style>
    :root {
      --bg: #0D1117;
      --surface: #161B22;
      --border: #30363D;
      --text: #E6EDF3;
      --text-muted: #8B949E;
      --accent: #58a6ff;
      --accent-dim: #388bfd;
      --error-bg: #3D1515;
      --error-border: #7A2020;
      --error-text: #FF7B7B;
      --input-bg: #0D1117;
      --radius: 6px;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      width: 100%;
      max-width: 360px;
    }

    .login-title {
      text-align: center;
      margin-bottom: 1.5rem;
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text);
    }

    .login-title .hostname {
      color: var(--accent);
    }

    .error-banner {
      display: none;
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      border-radius: var(--radius);
      color: var(--error-text);
      font-size: 0.875rem;
      padding: 0.625rem 0.75rem;
      margin-bottom: 1rem;
    }

    .error-banner.visible {
      display: block;
    }

    .field {
      margin-bottom: 1rem;
    }

    .field label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 0.375rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .field input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.9375rem;
      padding: 0.5rem 0.75rem;
      outline: none;
      transition: border-color 0.15s ease;
    }

    .field input:focus {
      border-color: var(--accent);
    }

    .field-username {
      display: none;
    }

    .field-username.visible {
      display: block;
    }

    .login-btn {
      width: 100%;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #0D1117;
      cursor: pointer;
      font-size: 0.9375rem;
      font-weight: 700;
      padding: 0.625rem 1rem;
      margin-top: 0.5rem;
      transition: background 0.15s ease;
    }

    .login-btn:hover {
      background: var(--accent-dim);
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-title">
      Recipe Dashboard &mdash; <span class="hostname">__HOSTNAME__</span>
    </div>

    <div id="error-banner" class="error-banner" role="alert" aria-live="assertive">
      Incorrect credentials. Please try again.
    </div>

    <form id="login-form">
      <div class="field field-username" id="username-field">
        <label for="username">Username</label>
        <input
          id="username"
          name="username"
          type="text"
          autocomplete="username"
          placeholder="username"
        />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input
          id="password"
          name="password"
          type="password"
          autocomplete="current-password"
          placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;"
          required
        />
      </div>

      <button type="submit" class="login-btn">Sign in</button>
    </form>
  </div>

  <script>
    (function () {
      // Auth mode injection — server sets window.DASHBOARD_AUTH before this runs.
      // Shape: { mode: 'pam' | 'password', hostname: string }
      var auth = window.DASHBOARD_AUTH || { mode: 'password', hostname: '' };

      // Show username field when auth mode is PAM
      if (auth.mode === 'pam') {
        var usernameField = document.getElementById('username-field');
        if (usernameField) {
          usernameField.classList.add('visible');
        }
      }

      // Show error banner when ?error=1 is present
      var params = new URLSearchParams(window.location.search);
      if (params.get('error') === '1') {
        var banner = document.getElementById('error-banner');
        if (banner) {
          banner.classList.add('visible');
        }
      }

      // Handle form submit via fetch (JSON API)
      document.getElementById('login-form').addEventListener('submit', function (e) {
        e.preventDefault();
        var username = document.getElementById('username').value;
        var password = document.getElementById('password').value;

        fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: username, password: password })
        })
        .then(function (resp) { return resp.json(); })
        .then(function (data) {
          if (data.ok) {
            window.location.href = '/';
          } else {
            var banner = document.getElementById('error-banner');
            if (banner) banner.classList.add('visible');
          }
        })
        .catch(function () {
          var banner = document.getElementById('error-banner');
          if (banner) banner.classList.add('visible');
        });
      });
    })();
  </script>
</body>
</html>
